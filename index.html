<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>倪氏天纪紫微 2000字全宫位详批系统 - 阿盛定制版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Serif SC', serif;
            background-color: #ece6d9;
        }
        .writing-vertical-lr {
            writing-mode: vertical-lr;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 30px;
        }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; margin: 0; padding: 0; }
            .print-only { display: block !important; }
            .print-container { 
                padding: 60px !important; 
                background: white !important; 
                min-height: 100vh;
                display: block !important;
            }
            .page-break { page-break-before: always; padding-top: 40px; border-top: 1px solid #eee; }
            .report-text { 
                font-size: 13pt !important; 
                line-height: 2.3 !important;
                text-align: justify;
                color: #111;
            }
            h1, h2, h3 { color: #7f1d1d !important; }
            .palace-grid-print { transform: scale(0.85); transform-origin: top center; }
        }
        
        .print-only { display: none; }
        
        .palace-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.1);
        }
        .loader {
            border-top-color: #7f1d1d;
            animation: spinner 0.6s linear infinite;
        }
        @keyframes spinner {
            to { transform: rotate(360deg); }
        }
        .calendar-btn.active {
            background-color: #7f1d1d;
            color: white;
            box-shadow: 0 4px 12px rgba(127, 29, 29, 0.3);
        }
        .ai-btn-primary {
            background: linear-gradient(135deg, #7f1d1d 0%, #450a0a 100%);
            border: 2px solid #fde68a;
        }
    </style>
</head>
<body class="p-2 md:p-6 text-slate-900">

    <div class="max-w-7xl mx-auto space-y-6 no-print">
        <header class="bg-white border-b-[12px] border-red-950 rounded-3xl p-8 md:p-10 shadow-2xl flex flex-col md:flex-row justify-between items-center gap-8 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-64 h-64 bg-red-900/5 rounded-full blur-[100px]"></div>
            <div class="flex items-center gap-8 z-10">
                <div class="bg-red-950 p-6 md:p-8 rounded-3xl text-white shadow-2xl ring-4 ring-red-50 relative group">
                    <i data-lucide="compass" class="w-10 h-10 md:w-12 md:h-12 transition-transform duration-1000 group-hover:rotate-180"></i>
                </div>
                <div>
                    <h1 class="text-3xl md:text-5xl font-black tracking-tighter text-slate-900">倪氏天纪·十二宫位详批系统</h1>
                    <div class="flex items-center gap-4 text-red-900 font-black text-[10px] md:text-xs mt-3 uppercase tracking-[0.4em] bg-red-50/50 w-fit px-4 py-1 rounded-full font-sans">
                        <i data-lucide="zap" class="w-3 h-3 text-red-600"></i> 阿盛定制版 · 2000字深度报告
                    </div>
                </div>
            </div>

            <div class="z-10">
                <button id="ai-btn-12" class="ai-btn-primary text-white px-8 py-5 rounded-2xl text-sm md:text-base font-black hover:scale-105 transition-all shadow-xl flex items-center gap-3 active:scale-95">
                    <i data-lucide="layout-grid" class="w-6 h-6"></i>
                    开启 2000字 天机推演 ✨
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-3 space-y-6">
                <section class="bg-white rounded-[2.5rem] p-8 shadow-xl border border-slate-200">
                    <h2 class="text-xs font-black mb-8 flex items-center gap-2 text-slate-500 uppercase tracking-widest border-b border-slate-50 pb-4">
                        <i data-lucide="user" class="w-4 h-4 text-red-900"></i> 命主生辰档案
                    </h2>
                    <div class="space-y-6">
                        <div class="flex p-1 bg-slate-100 rounded-xl mb-4 shadow-inner">
                            <button onclick="setCalendar('west')" id="cal-west" class="calendar-btn flex-1 py-2 text-[10px] font-black rounded-lg transition-all">西历 (Solar)</button>
                            <button onclick="setCalendar('lunar')" id="cal-lunar" class="calendar-btn flex-1 py-2 text-[10px] font-black rounded-lg transition-all active">农历 (Lunar)</button>
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-400 font-black block mb-2 px-1">名讳</label>
                            <input type="text" id="input-name" value="阿盛" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl px-4 py-3 text-sm font-bold focus:border-red-900 outline-none" />
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-[10px] text-slate-400 font-black block mb-2 px-1 text-center">性别</label>
                                <select id="input-gender" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl px-3 py-3 text-sm font-bold">
                                    <option value="男">乾造 (男)</option><option value="女">坤造 (女)</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] text-slate-400 font-black block mb-2 px-1 text-center">时辰</label>
                                <select id="input-time" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl px-3 py-3 text-sm font-bold">
                                    <option value="寅">寅 (3-5)</option><option value="子">子 (23-1)</option><option value="丑">丑 (1-3)</option>
                                    <option value="卯">卯 (5-7)</option><option value="辰">辰 (7-9)</option><option value="巳">巳 (9-11)</option>
                                    <option value="午">午 (11-13)</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-400 font-black block mb-2 px-1">出生日期</label>
                            <div class="grid grid-cols-3 gap-2">
                                <input type="number" id="input-year" value="1980" class="bg-slate-50 border-2 border-slate-100 rounded-xl py-3 text-xs text-center font-bold" />
                                <input type="number" id="input-month" value="9" class="bg-slate-50 border-2 border-slate-100 rounded-xl py-3 text-xs text-center font-bold" />
                                <input type="number" id="input-day" value="30" class="bg-slate-50 border-2 border-red-200 rounded-xl py-3 text-xs text-center font-black text-red-900 shadow-inner" />
                            </div>
                        </div>
                    </div>
                </section>
                <section class="bg-red-950 rounded-[2.5rem] p-10 text-red-50 shadow-2xl relative overflow-hidden">
                    <i data-lucide="shield" class="absolute -right-4 -bottom-4 w-24 h-24 text-white/5"></i>
                    <h2 class="text-xs font-black mb-6 text-red-400 uppercase tracking-widest font-sans">NI HAIXIA SPIRIT</h2>
                    <p class="text-sm leading-relaxed italic opacity-80 font-serif">“全宫位推演，方能见微知著。每一个宫位都是一道关卡，亦是一处道场。”</p>
                </section>
            </div>

            <div class="lg:col-span-9 space-y-6">
                <div class="bg-white rounded-[3.5rem] p-8 md:p-12 shadow-2xl border border-slate-200 min-h-[850px]">
                    <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-8">
                        <div class="flex p-2 bg-slate-100 rounded-[2rem] shadow-inner w-fit">
                            <button onclick="switchTab('chart')" id="tab-chart" class="tab-btn px-12 py-3.5 rounded-[1.5rem] text-sm font-black transition-all bg-white text-red-950 shadow-2xl scale-105">天机命阵图</button>
                            <button onclick="switchTab('analysis')" id="tab-analysis" class="tab-btn px-12 py-3.5 rounded-[1.5rem] text-sm font-black transition-all text-slate-400">详批报告内容</button>
                        </div>
                        <div class="flex gap-4">
                            <button onclick="shareToWhatsApp()" class="bg-green-600 text-white px-6 py-4 rounded-2xl text-sm font-black hover:bg-green-700 shadow-xl transition-all">
                                <i data-lucide="message-circle" class="w-5 h-5"></i> 分享
                            </button>
                            <button onclick="prepareAndPrint()" class="bg-slate-900 text-white px-8 py-4 rounded-2xl text-sm font-black hover:bg-black shadow-2xl flex items-center gap-4 transition-all">
                                <i data-lucide="printer" class="w-5 h-5"></i> 导出 2000字 PDF
                            </button>
                        </div>
                    </div>

                    <div id="view-chart" class="block overflow-x-auto pb-10 custom-scrollbar">
                        <div id="palace-grid" class="min-w-[850px] grid grid-cols-4 grid-rows-4 gap-4 p-4 bg-slate-50/50 rounded-[3rem]"></div>
                    </div>

                    <div id="view-analysis" class="hidden space-y-12 pr-6 max-h-[1000px] overflow-y-auto custom-scrollbar font-serif">
                        <div id="ai-response-container" class="hidden space-y-8">
                            <div id="section-12" class="bg-amber-50 p-10 rounded-[3rem] border-2 border-amber-200 shadow-xl relative">
                                <div class="flex justify-between items-center mb-10 border-b-2 border-amber-100 pb-8">
                                    <h4 class="text-3xl font-black text-amber-900 flex items-center gap-4">
                                        <i data-lucide="feather" class="w-10 h-10 text-amber-600"></i> 倪师十二宫动态详批
                                    </h4>
                                    <button onclick="playTts('text-12')" class="bg-amber-600 text-white p-4 rounded-full hover:bg-amber-700 shadow-xl transition-all">
                                        <i data-lucide="volume-2" class="w-6 h-6"></i>
                                    </button>
                                </div>
                                <p id="text-12" class="text-xl text-amber-950 leading-[2.6] whitespace-pre-wrap pl-8 border-l-4 border-amber-200"></p>
                            </div>
                        </div>
                        <div id="empty-analysis" class="text-center py-20 bg-slate-50 rounded-[3rem] border border-dashed border-slate-300">
                             <p class="text-slate-400 text-xl font-bold">尚未开启推演，请点击上方按钮进行深度分析</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 打印预览区 -->
    <div id="print-report" class="print-only print-container font-serif">
        <div class="max-w-4xl mx-auto">
            <div class="text-center border-b-[20px] border-double border-red-900 pb-20 mb-20">
                <div class="flex justify-center mb-12">
                    <div class="w-32 h-32 border-8 border-red-900 rounded-[2rem] flex items-center justify-center rotate-45 shadow-2xl bg-white">
                       <i data-lucide="compass" class="w-20 h-20 text-red-950 -rotate-45"></i>
                    </div>
                </div>
                <h1 class="text-8xl font-black text-slate-900 mb-6 italic">倪氏天纪详批报告</h1>
                <h2 class="text-3xl font-bold text-red-900 mb-12 tracking-[0.5em] uppercase">二零二六 馆藏专修本</h2>
                <div id="print-user-info" class="mt-20 grid grid-cols-2 gap-12 text-2xl font-black text-slate-600 border-y-4 border-slate-100 py-12 px-8"></div>
            </div>
            <div class="page-break space-y-12 py-20">
                <h2 class="text-5xl font-black border-l-[20px] border-red-950 pl-10 mb-16 text-left">乾坤动态命造图</h2>
                <div id="print-grid" class="palace-grid-print grid grid-cols-4 grid-rows-4 gap-3 border-4 border-slate-300 p-8 rounded-[4rem] bg-[#fdfaf2] shadow-inner"></div>
            </div>
            <div id="print-content" class="report-text space-y-20 py-20"></div>
        </div>
    </div>

    <!-- 加载器 -->
    <div id="global-loader" class="hidden fixed inset-0 bg-slate-950/98 backdrop-blur-3xl z-[100] flex flex-col items-center justify-center px-10 text-center">
        <div class="loader ease-linear rounded-full border-[12px] border-t-[12px] border-slate-200 h-36 w-36 mb-16 shadow-[0_0_120px_rgba(255,255,255,0.1)]"></div>
        <h2 id="loader-status" class="text-4xl font-black text-white tracking-[0.2em] mb-4">正在连接天机...</h2>
        <p id="loader-progress" class="text-xl text-red-500 font-bold animate-pulse tracking-widest uppercase">Streaming Pipeline Analysis (2000 Words)</p>
    </div>

    <script>
        const apiKey = "";
        const GEMINI_MODEL = "gemini-2.5-flash-preview-09-2025";
        const TTS_MODEL = "gemini-2.5-flash-preview-tts";

        const EARTHLY_BRANCHES = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
        const HEAVENLY_STEMS = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
        const PALACES_NAMES = ["命宫", "兄弟", "夫妻", "子女", "财帛", "疾厄", "迁移", "奴仆", "官禄", "田宅", "福德", "父母"];

        let state = {
            name: "阿盛", gender: "男", calendarType: "lunar", year: 1980, month: 9, day: 30, time: "寅",
            ai12Palaces: ""
        };

        function setCalendar(type) {
            state.calendarType = type;
            document.querySelectorAll('.calendar-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`cal-${type}`).classList.add('active');
            renderChart();
        }

        function calculatePalaces() {
            const timeIndex = EARTHLY_BRANCHES.indexOf(state.time);
            const mingGongIdx = (parseInt(state.month) - 1 - timeIndex + 12) % 12; 
            const shenGongIdx = (parseInt(state.month) - 1 + timeIndex) % 12;
            const yearStemIndex = (parseInt(state.year) - 4) % 10;
            const startStemIdx = (yearStemIndex % 5) * 2 + 2;

            let result = [];
            for (let i = 0; i < 12; i++) {
                const name = PALACES_NAMES[(i - mingGongIdx + 12) % 12];
                result.push({
                    branch: EARTHLY_BRANCHES[(i + 2) % 12],
                    stem: HEAVENLY_STEMS[(startStemIdx + i) % 10],
                    name, isMingGong: name === "命宫", isShenGong: i === shenGongIdx,
                    stars: name === "命宫" ? ["紫微","七杀"] : (name === "财帛" ? ["武曲"] : (name === "官禄" ? ["廉贞"] : [])),
                    daYun: `${i * 10 + 5} - ${i * 10 + 14}`
                });
            }
            return result;
        }

        function renderChart() {
            const palaces = calculatePalaces();
            const grid = document.getElementById('palace-grid');
            grid.innerHTML = '';
            const order = [5, 6, 7, 8, 4, 'center', 9, 3, 'center', 10, 2, 1, 0, 11];
            order.forEach(idx => {
                if (idx === 'center') {
                    if (!grid.querySelector('.center-mark')) {
                        const c = document.createElement('div');
                        c.className = 'center-mark col-span-2 row-span-2 bg-[#fdfaf2] border-8 border-red-900/10 rounded-[4rem] flex flex-col items-center justify-center p-8';
                        c.innerHTML = `<h3 class="text-7xl font-black text-slate-900 mb-2">紫微</h3><p class="text-red-900 font-black">${state.name} 命造</p>`;
                        grid.appendChild(c);
                    }
                    return;
                }
                const p = palaces[idx];
                const card = document.createElement('div');
                card.className = `palace-card border p-3 h-44 md:h-52 flex flex-col justify-between ${p.isMingGong ? 'bg-red-50/80 border-red-700' : 'bg-[#fffcf7] border-slate-300'}`;
                card.innerHTML = `<div><span class="text-xs font-black px-2 py-0.5 rounded ${p.isMingGong ? 'bg-red-700 text-white' : 'bg-slate-800 text-white'}">${p.name}</span></div>
                    <div class="flex-grow flex items-center justify-center gap-2">${p.stars.map(s => `<span class="text-2xl font-black text-red-900 writing-vertical-lr">${s}</span>`).join('')}</div>
                    <div class="flex justify-between text-[10px] font-bold text-slate-500"><span>${p.stem}${p.branch}</span><span>${p.daYun}</span></div>`;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        async function fetchWithRetry(url, options) {
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) {
                        const data = await response.json();
                        if (data.candidates && data.candidates[0].content) return data;
                    }
                } catch (e) { console.error(e); }
                await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
            }
            throw new Error("连接超时");
        }

        async function runChunkedAIEngine() {
            const loader = document.getElementById('global-loader');
            const status = document.getElementById('loader-status');
            const progress = document.getElementById('loader-progress');
            loader.classList.remove('hidden');

            const baseContext = `命主:${state.name}, 生辰:${state.year}-${state.month}-${state.day}, 历法:${state.calendarType}, 性别:${state.gender}`;
            const system = "你扮演倪海厦老师。一针见血，强调地纪方位（东南西北避忌）和人纪修身。字数充实。";
            let fullContent = "";

            try {
                // 分两段推演十二宫位
                for (let step = 1; step <= 2; step++) {
                    status.textContent = `推演宫位精要 (${step}/2)...`;
                    progress.textContent = `正在构建第 ${step} 段十二宫深度解析 (目标 2000 字)...`;
                    const prompt = `${baseContext}。请进行十二宫位详批第 ${step} 部分（${step === 1 ? '命宫、兄弟、夫妻、子女、财帛、疾厄' : '迁移、交友、官禄、田宅、福德、父母'}）。每一宫位不少于 180 字。`;
                    
                    const res = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`, {
                        method: 'POST', body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: system }] },
                            generationConfig: { maxOutputTokens: 3000, temperature: 0.75 },
                            safetySettings: [{ category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }]
                        }), headers: { 'Content-Type': 'application/json' }
                    });
                    fullContent += res.candidates[0].content.parts[0].text + "\n\n";
                }
                
                state.ai12Palaces = fullContent;
                document.getElementById('text-12').textContent = fullContent;
                document.getElementById('ai-response-container').classList.remove('hidden');
                document.getElementById('empty-analysis').classList.add('hidden');
                switchTab('analysis');
            } catch (e) {
                alert("天机推演中断：当前生成量较大，由于网络限制导致超时。请再次点击按钮，系统将重新连接。");
            } finally {
                loader.classList.add('hidden');
            }
        }

        async function playTts(elementId) {
            const text = document.getElementById(elementId).textContent;
            if (!text) return;
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${TTS_MODEL}:generateContent?key=${apiKey}`;
                const payload = {
                    contents: [{ parts: [{ text: `请用沉稳睿智的长者声音诵读：${text.substring(0, 4500)}` }] }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Charon" } } }
                    }
                };
                const resp = await fetch(url, { method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'application/json' } });
                const data = await resp.json();
                const audioData = data.candidates[0].content.parts[0].inlineData.data;
                const binary = atob(audioData);
                const bytes = new Int16Array(binary.length / 2);
                for (let i = 0; i < binary.length; i += 2) bytes[i / 2] = (binary.charCodeAt(i + 1) << 8) | binary.charCodeAt(i);
                const audio = new Audio(URL.createObjectURL(new Blob([bytes], { type: 'audio/wav' })));
                audio.play();
            } catch (e) { alert("语音功能暂不可用"); }
        }

        function prepareAndPrint() {
            if (!state.ai12Palaces) return alert("请先开启天机推演");
            document.getElementById('print-user-info').innerHTML = `<div>名讳：${state.name}</div><div>生辰：${state.year}年${state.month}月${state.day}日 (${state.calendarType === 'lunar' ? '农历' : '西历'})</div>`;
            document.getElementById('print-grid').innerHTML = document.getElementById('palace-grid').innerHTML;
            const content = document.getElementById('print-content');
            const sections = state.ai12Palaces.split('【').filter(s => s.trim() !== "");
            content.innerHTML = sections.map(s => `<div class="mb-12"><div class="text-2xl leading-[2.6] text-slate-800 whitespace-pre-wrap font-serif">【${s}</div></div>`).join('');
            window.print();
        }

        function switchTab(tab) {
            document.getElementById('view-chart').className = tab === 'chart' ? 'block' : 'hidden';
            document.getElementById('view-analysis').className = tab === 'analysis' ? 'block' : 'hidden';
            document.querySelectorAll('.tab-btn').forEach(b => b.className = "tab-btn px-12 py-3.5 rounded-[1.5rem] text-sm font-black transition-all text-slate-400");
            document.getElementById(`tab-${tab}`).className = "tab-btn px-12 py-3.5 rounded-[1.5rem] text-sm font-black transition-all bg-white text-red-950 shadow-2xl scale-105";
        }

        function shareToWhatsApp() {
            if (!state.ai12Palaces) return alert("请先生成报告");
            const text = `【倪氏详批报告预览 · ${state.name}】\n核心断语详见 PDF。`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        ['name', 'gender', 'time', 'year', 'month', 'day'].forEach(id => {
            document.getElementById(`input-${id}`).addEventListener('change', (e) => { state[id] = e.target.value; renderChart(); });
        });

        document.getElementById('ai-btn-12').addEventListener('click', runChunkedAIEngine);
        window.onload = renderChart;
    </script>
</body>
</html>
