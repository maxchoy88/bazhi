<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>倪氏天纪紫微 2000字详批系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Serif SC', serif;
            background-color: #ece6d9;
        }
        .writing-vertical-lr {
            writing-mode: vertical-lr;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 20px;
        }
        
        /* 打印分页控制 */
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; margin: 0; padding: 0; }
            .print-only { display: block !important; }
            .print-container { 
                padding: 50px !important; 
                background: white !important; 
                min-height: 100vh;
                display: block !important;
            }
            .page-break { page-break-after: always; }
            .report-text { 
                font-size: 14pt !important; 
                line-height: 2 !important;
                text-align: justify;
            }
        }
        
        .print-only { display: none; }
        
        .palace-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .loader {
            border-top-color: #7f1d1d;
            animation: spinner 0.8s linear infinite;
        }
        @keyframes spinner {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-2 md:p-6 text-slate-900">

    <!-- 网页 UI -->
    <div class="max-w-7xl mx-auto space-y-4 no-print">
        <header class="bg-white border-b-[12px] border-red-950 rounded-3xl p-8 shadow-2xl flex flex-col md:flex-row justify-between items-center gap-6 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-48 h-48 bg-red-900/5 rounded-full blur-[80px]"></div>
            <div class="flex items-center gap-8 z-10">
                <div class="bg-red-950 p-6 rounded-3xl text-white shadow-2xl ring-4 ring-red-50 relative group">
                    <i data-lucide="compass" class="w-10 h-10"></i>
                    <div class="absolute -top-2 -right-2 bg-amber-500 w-6 h-6 rounded-full flex items-center justify-center border-2 border-white shadow-lg animate-bounce">
                        <i data-lucide="sparkles" class="w-3 h-3 text-white"></i>
                    </div>
                </div>
                <div>
                    <h1 class="text-4xl md:text-5xl font-black tracking-tighter text-slate-900">倪氏天纪·2000字详批报告</h1>
                    <div class="flex items-center gap-4 text-red-900 font-black text-xs mt-3 uppercase tracking-[0.4em] bg-red-50/50 w-fit px-3 py-1 rounded-full">
                        <i data-lucide="award" class="w-3 h-3"></i> 馆藏级别 · 四柱八字集成分析
                    </div>
                </div>
            </div>

            <div class="flex flex-col items-center gap-3 z-10">
                <button id="ai-btn" class="bg-red-800 text-white px-8 py-3 rounded-2xl text-sm font-black hover:bg-black transition-all shadow-xl flex items-center gap-3">
                    <i data-lucide="zap" class="w-4 h-4"></i>
                    生成 2000字 深度解盘 ✨
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-3 space-y-4">
                <section class="bg-white rounded-[2.5rem] p-8 shadow-xl border border-slate-200">
                    <h2 class="text-xs font-black mb-8 flex items-center gap-2 text-slate-500 uppercase tracking-widest border-b border-slate-50 pb-4">
                        <i data-lucide="calendar" class="w-4 h-4 text-red-900"></i> 命主资料
                    </h2>
                    <div class="space-y-6">
                        <div>
                            <label class="text-[11px] font-black text-slate-400 block mb-2 px-1">名讳</label>
                            <input type="text" id="input-name" value="阿盛" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-5 py-4 text-sm focus:border-red-900 outline-none transition-all shadow-sm" />
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[11px] font-black text-slate-400 block mb-2 px-1">性别</label>
                                <select id="input-gender" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-4 py-4 text-sm font-bold">
                                    <option value="男">男</option>
                                    <option value="女">女</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[11px] font-black text-slate-400 block mb-2 px-1">时辰</label>
                                <select id="input-time" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-4 py-4 text-sm font-bold">
                                    <option value="寅">寅时</option>
                                    <option value="子">子时</option>
                                    <option value="丑">丑时</option>
                                    <option value="卯">卯时</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="text-[11px] font-black text-slate-400 block mb-2 px-1">农历生日</label>
                            <div class="grid grid-cols-3 gap-3">
                                <input type="number" id="input-year" value="1980" class="bg-slate-50 border-2 border-slate-100 rounded-2xl py-3 text-sm text-center font-bold" />
                                <input type="number" id="input-month" value="9" class="bg-slate-50 border-2 border-slate-100 rounded-2xl py-3 text-sm text-center font-bold" />
                                <input type="number" id="input-day" value="30" class="bg-slate-50 border-2 border-red-200 rounded-2xl py-3 text-sm text-center font-black text-red-900" />
                            </div>
                        </div>
                    </div>
                </section>
                <section class="bg-red-950 rounded-[2.5rem] p-10 text-red-50 shadow-2xl relative overflow-hidden">
                    <h2 class="text-xs font-black mb-6 flex items-center gap-2 text-red-400">倪师秘录</h2>
                    <p class="text-sm leading-relaxed italic opacity-80 font-serif">“理在命先，位正命顺。2000字之详批，旨在究天人之际，通古今之变。”</p>
                </section>
            </div>

            <div class="lg:col-span-9 space-y-4">
                <div class="bg-white rounded-[3rem] p-6 md:p-12 shadow-2xl border border-slate-200 min-h-[800px]">
                    <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-8">
                        <div class="flex p-2 bg-slate-100 rounded-[2.5rem]">
                            <button onclick="switchTab('chart')" id="tab-chart" class="tab-btn px-12 py-3.5 rounded-[2rem] text-sm font-black transition-all bg-white text-red-950 shadow-2xl scale-105">命造布阵</button>
                            <button onclick="switchTab('analysis')" id="tab-analysis" class="tab-btn px-12 py-3.5 rounded-[2rem] text-sm font-black transition-all text-slate-400">深度解析</button>
                        </div>
                        <button onclick="prepareAndPrint()" class="bg-red-950 text-white px-12 py-4 rounded-2xl text-sm font-black hover:bg-black shadow-2xl flex items-center gap-4 transition-all">
                            <i data-lucide="printer" class="w-5 h-5"></i> 导出 2000字 深入报告
                        </button>
                    </div>

                    <div id="view-chart" class="block overflow-x-auto pb-6 custom-scrollbar">
                        <div id="palace-grid" class="min-w-[800px] grid grid-cols-4 grid-rows-4 gap-4 p-2 bg-slate-50/50 rounded-[3rem]"></div>
                    </div>

                    <div id="view-analysis" class="hidden space-y-12 pr-4 max-h-[800px] overflow-y-auto custom-scrollbar font-serif">
                        <div id="ai-response-container" class="hidden bg-amber-50 p-10 rounded-[3rem] border-2 border-amber-200 shadow-xl relative">
                            <div class="flex justify-between items-center mb-8">
                                <h4 class="text-3xl font-black text-amber-900 flex items-center gap-3">
                                    <i data-lucide="feather" class="w-8 h-8"></i> 倪师 AI 2000字长文批命 ✨
                                </h4>
                                <button id="tts-btn" class="bg-amber-600 text-white p-4 rounded-full hover:bg-amber-700 shadow-lg transition-transform hover:scale-110">
                                    <i data-lucide="volume-2" class="w-6 h-6"></i>
                                </button>
                            </div>
                            <p id="ai-text" class="text-xl text-amber-950 leading-[2.8] whitespace-pre-wrap pl-8 border-l-4 border-amber-200"></p>
                        </div>
                        <div id="static-analysis" class="grid grid-cols-1 gap-12 text-lg"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 打印专区 -->
    <div id="print-report" class="print-only print-container font-serif">
        <div class="max-w-4xl mx-auto">
            <!-- 封面 -->
            <div class="text-center border-b-[20px] border-double border-red-900 pb-20 mb-20 page-break">
                <div class="flex justify-center mb-10">
                    <div class="w-32 h-32 border-8 border-red-900 rounded-[2rem] flex items-center justify-center rotate-45 shadow-2xl">
                       <i data-lucide="compass" class="w-20 h-20 text-red-950 -rotate-45"></i>
                    </div>
                </div>
                <h1 class="text-8xl font-black text-slate-900 mb-8 tracking-tighter">倪氏三才深入分析</h1>
                <h2 class="text-3xl font-bold text-red-900 mb-12 tracking-[1em] uppercase">2000字馆藏批本</h2>
                <div id="print-user-info" class="mt-20 grid grid-cols-2 gap-12 text-2xl font-black text-slate-600 border-y-4 border-slate-100 py-10 px-8"></div>
            </div>

            <!-- 命盘页 -->
            <div class="page-break space-y-12 py-20">
                <h2 class="text-4xl font-black border-l-[16px] border-red-950 pl-10 mb-16">乾坤命造大图</h2>
                <div id="print-grid" class="grid grid-cols-4 grid-rows-4 gap-3 border-4 border-slate-300 p-4 rounded-[3rem] bg-slate-50 shadow-inner"></div>
                <p class="text-center text-slate-400 mt-10 font-bold tracking-widest italic">※ 备注：此图根据倪氏天纪法门排布 ※</p>
            </div>

            <!-- 内容页 -->
            <div class="space-y-20 py-20">
                <div id="print-content" class="report-text space-y-16">
                    <!-- JS fills this -->
                </div>
            </div>

            <div class="mt-40 pt-20 border-t-8 border-double border-slate-100 text-center text-slate-300">
                <p class="text-4xl italic mb-16 text-slate-400">“理正则命顺，心医胜中医。”</p>
                <p class="text-sm font-black tracking-[2em]">— 公元二零二六 庚申 乙酉 丙午 谨志 —</p>
            </div>
        </div>
    </div>

    <!-- 加载遮罩 -->
    <div id="global-loader" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-2xl z-[100] flex flex-col items-center justify-center">
        <div class="loader ease-linear rounded-full border-8 border-t-8 border-slate-200 h-24 w-24 mb-8"></div>
        <h2 class="text-3xl font-black text-white tracking-widest">正在推演 2000 字天地人详批...</h2>
        <p class="text-slate-400 mt-4 animate-pulse">命理深邃，请耐心等待倪师出关</p>
    </div>

    <script>
        const apiKey = "";
        const GEMINI_MODEL = "gemini-2.5-flash-preview-09-2025";
        const TTS_MODEL = "gemini-2.5-flash-preview-tts";

        const EARTHLY_BRANCHES = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
        const HEAVENLY_STEMS = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
        const PALACES_NAMES = ["命宫", "兄弟", "夫妻", "子女", "财帛", "疾厄", "迁移", "奴仆", "官禄", "田宅", "福德", "父母"];

        let state = {
            name: "阿盛",
            gender: "男",
            year: 1980,
            month: 9,
            day: 30,
            time: "寅",
            aiAnalysis: "",
            isLoading: false
        };

        const getElementColor = (item) => {
            const wood = ["甲", "乙", "寅", "卯"];
            const fire = ["丙", "丁", "巳", "午"];
            const metal = ["庚", "辛", "申", "酉"];
            if (wood.includes(item)) return "text-emerald-700";
            if (fire.includes(item)) return "text-red-600";
            if (metal.includes(item)) return "text-yellow-600";
            return "text-slate-500";
        };

        function calculatePalaces() {
            const yearStemIndex = (state.year - 4) % 10;
            const startStemIndex = (yearStemIndex % 5) * 2 + 2;
            const timeIndex = EARTHLY_BRANCHES.indexOf(state.time);
            const mingGongIdx = (state.month - 1 - timeIndex + 12) % 12; 
            const shenGongIdx = (state.month - 1 + timeIndex) % 12;

            let result = [];
            for (let i = 0; i < 12; i++) {
                const name = PALACES_NAMES[(i - mingGongIdx + 12) % 12];
                const stars = [];
                if (name === "命宫") stars.push({name:"紫微", b:"庙"}, {name:"七杀", b:"旺"});
                if (name === "财帛") stars.push({name:"武曲", b:"庙"});
                if (name === "官禄") stars.push({name:"廉贞", b:"庙"});
                
                result.push({
                    branch: EARTHLY_BRANCHES[(i + 2) % 12],
                    stem: HEAVENLY_STEMS[(startStemIndex + i) % 10],
                    name,
                    stars,
                    isMingGong: name === "命宫",
                    isShenGong: i === shenGongIdx,
                    daYun: `${i * 10 + 5} - ${i * 10 + 14}`
                });
            }
            return result;
        }

        function renderChart() {
            const palaces = calculatePalaces();
            const grid = document.getElementById('palace-grid');
            grid.innerHTML = '';
            const order = [5, 6, 7, 8, 4, 'center', 9, 3, 'center', 10, 2, 1, 0, 11];
            order.forEach(idx => {
                if (idx === 'center') {
                    if (!grid.querySelector('.center-mark')) {
                        const c = document.createElement('div');
                        c.className = 'center-mark col-span-2 row-span-2 bg-[#fdfaf2] border-8 border-double border-red-900/20 rounded-[4rem] flex flex-col items-center justify-center p-8 shadow-inner';
                        c.innerHTML = `<h3 class="text-7xl font-black text-slate-900 mb-4 tracking-tighter">紫微</h3>
                                       <div class="grid grid-cols-4 gap-4 px-4 py-4 bg-white/40 rounded-3xl border border-red-900/5 mb-4">
                                            <div class="flex flex-col"><span class="text-[9px] text-slate-400 font-black">年</span><span class="text-xs font-black">庚申</span></div>
                                            <div class="flex flex-col"><span class="text-[9px] text-slate-400 font-black">月</span><span class="text-xs font-black">乙酉</span></div>
                                            <div class="flex flex-col"><span class="text-[9px] text-red-400 font-black">日</span><span class="text-xs font-black text-red-900">丙午</span></div>
                                            <div class="flex flex-col"><span class="text-[9px] text-slate-400 font-black">时</span><span class="text-xs font-black">${state.time}时</span></div>
                                       </div>`;
                        grid.appendChild(c);
                    }
                    return;
                }
                const p = palaces[idx];
                const card = document.createElement('div');
                card.className = `palace-card relative border p-2 h-40 md:h-48 flex flex-col justify-between transition-all ${p.isMingGong ? 'bg-red-50/70 border-red-700 ring-2 ring-red-700/20' : 'bg-[#fffcf5] border-slate-300'}`;
                card.innerHTML = `<div class="flex justify-between items-start">
                    <span class="text-[11px] font-black px-2 py-0.5 rounded ${p.isMingGong ? 'bg-red-700 text-white' : 'bg-slate-800 text-white'}">${p.name} ${p.isShenGong ? '身' : ''}</span>
                    <span class="text-[12px] font-black ${getElementColor(p.stem)}">${p.stem}${p.branch}</span>
                </div>
                <div class="flex flex-grow items-center justify-center gap-2">
                    ${p.stars.map(s => `<span class="text-lg font-black text-red-900 writing-vertical-lr">${s.name}</span>`).join('')}
                </div>
                <span class="text-[9px] text-slate-400 font-mono">${p.daYun} 岁</span>`;
                grid.appendChild(card);
            });
            lucide.createIcons();
            updateAnalysisUI();
        }

        function updateAnalysisUI() {
            const container = document.getElementById('static-analysis');
            container.innerHTML = `
                <div class="bg-[#fffdf9] p-12 rounded-[4rem] border-2 border-slate-100 shadow-2xl">
                    <h4 class="text-3xl font-black text-red-950 mb-10 border-b-4 border-red-50 pb-6">倪师三才要略</h4>
                    <div class="space-y-10 text-xl leading-[2.4] text-slate-800">
                        <p><strong>天纪：</strong> 阿盛，您庚申金年、乙酉金月、丙午火日。金气过盛，需火炼之。紫微七杀在命，乃化气为权之格，主贵而不主富。武曲化权在财，主实干得财。此命局贵在开创，不宜守成。</p>
                        <p><strong>地纪：</strong> 西北乾位乃您的命门。作为1980年生长男，西北绝不可见火或厕。正东震位需通透。丙午日火性燥，西南见水为妙。</p>
                    </div>
                </div>`;
        }

        async function generate2000Words() {
            const loader = document.getElementById('global-loader');
            loader.classList.remove('hidden');
            const palaces = calculatePalaces();
            const context = `命主:阿盛, 性别:男, 四柱:庚申年 乙酉月 丙午日 庚寅时。宫位数据:${JSON.stringify(palaces.map(p=>({n:p.name, s:p.stars.map(s=>s.name)})))}`;
            
            const system = `你是一位精通倪海厦老师《天纪》体系的紫微斗数宗师。
你的任务是为命主写一份字数不少于 2000 字的极深度分析报告。
报告结构要求：
1. 宏观格局（500字）：从四柱纳音、五行局深度剖析其人生基调。
2. 十二宫深度拆解（1000字）：挑选命、财、官、迁、疾、友等核心宫位进行星曜与四化路径的精密推导。
3. 倪氏三才专断（500字）：提供具体的阳宅方位调整方案（地纪）和基于五行的中医养生策略（人纪）。
风格：语气要像倪师本人，刚毅、幽默、一针见血。使用“我告诉你”、“听好了”等口语化但专业的倪氏语言。
请确保内容充实、专业，严禁废话，字数必须达到 2000 字规模。`;

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`;
                const payload = { contents: [{ parts: [{ text: `请对以下命局进行 2000 字深解：${context}` }] }], systemInstruction: { parts: [{ text: system }] } };
                
                const response = await fetch(url, { method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'application/json' } });
                const result = await response.json();
                const content = result.candidates[0].content.parts[0].text;
                
                state.aiAnalysis = content;
                document.getElementById('ai-text').textContent = content;
                document.getElementById('ai-response-container').classList.remove('hidden');
                switchTab('analysis');
            } catch (e) {
                alert("推演失败，请检查网络");
            } finally {
                loader.classList.add('hidden');
            }
        }

        function prepareAndPrint() {
            const printInfo = document.getElementById('print-user-info');
            printInfo.innerHTML = `<div>名讳：${state.name} | 性别：${state.gender}</div>
                                   <div>四柱：庚申 乙酉 丙午 庚寅</div>`;
            
            document.getElementById('print-grid').innerHTML = document.getElementById('palace-grid').innerHTML;
            
            const printContent = document.getElementById('print-content');
            printContent.innerHTML = `
                <section class="space-y-10">
                    <h3 class="text-4xl font-black text-red-950 border-b-4 border-red-100 pb-4">第一部分：三才初断</h3>
                    ${document.getElementById('static-analysis').innerHTML}
                </section>
                <section class="space-y-10 pt-20">
                    <h3 class="text-4xl font-black text-amber-900 border-b-4 border-amber-100 pb-4">第二部分：倪师 AI 2000字深度报告</h3>
                    <div class="report-text whitespace-pre-wrap">${state.aiAnalysis || "（尚未生成 AI 报告，请先点击‘生成2000字深度解盘’）"}</div>
                </section>
            `;
            
            window.print();
        }

        function switchTab(tab) {
            document.getElementById('view-chart').className = tab === 'chart' ? 'block overflow-x-auto pb-6 custom-scrollbar' : 'hidden';
            document.getElementById('view-analysis').className = tab === 'analysis' ? 'block space-y-12 pr-4 max-h-[800px] overflow-y-auto custom-scrollbar' : 'hidden';
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(b => b.className = "tab-btn px-12 py-3.5 rounded-[2rem] text-sm font-black transition-all text-slate-400");
            const active = document.getElementById(`tab-${tab}`);
            active.className = "tab-btn px-12 py-3.5 rounded-[2rem] text-sm font-black transition-all bg-white text-red-950 shadow-2xl scale-105";
        }

        document.getElementById('ai-btn').addEventListener('click', generate2000Words);
        
        // Input Sync
        ['name', 'gender', 'year', 'month', 'day', 'time'].forEach(k => {
            document.getElementById(`input-${k}`).addEventListener('change', e => {
                state[k] = e.target.value;
                renderChart();
            });
        });

        window.onload = renderChart;
    </script>
</body>
</html>
