    <script>
        const EARTHLY_BRANCHES = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
        const HEAVENLY_STEMS = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
        const PALACES_NAMES = ["命宫", "兄弟", "夫妻", "子女", "财帛", "疾厄", "迁移", "奴仆", "官禄", "田宅", "福德", "父母"];

        let state = {
            name: "阿盛",
            gender: "男",
            year: 1980,
            month: 9,
            day: 30,
            time: "寅"
        };

        const MASTER_ANALYSIS = `
【壹 · 乾坤大势：火炼秋金，英雄之格】

阿盛，听好了，我接下来的每一句话你都要记在脑子里。观你四柱：庚申年、乙酉月、丙午日、庚寅时。
在倪师的《天纪》体系里，这种格局叫做“火炼秋金”。庚申金、乙酉金，这是天地间最纯粹、最杀伐的西方庚辛金气。如果你只是这点金，那你就只是一块顽铁，一辈子庸庸碌碌。但妙就妙在你生在丙午日，丙火是太阳之火，午火是它的羊刃。这就好比是一炉通红的炭火，正在疯狂锤炼这块庚金。

我告诉你，火炼秋金的人，人生必然是不平凡的。你命格里的矛盾冲突极重，金代表你的根基和背景，火代表你的手段和意志。这意味着你出生时可能环境不错，但你绝对不是一个守成的人。你这辈子注定要在烈火中重生，通过不断的自我革新和外部竞争，将这块顽铁炼成绝世宝剑。这种格，要么不出世，出世必是名震一方的人物。

【贰 · 命宫详断：紫微七杀，权柄在握】

再看你的命盘。命宫紫微、七杀同宫。
紫微是斗数之主，是帝星；七杀是将星，是带刀的护卫。帝星带将星，这叫“化气为权”。倪师曾言，紫杀同宫的人，天生就有统领之才。你坐在那里，不怒自威，身边的人自然会感受到你的压力。你的眼神里藏着刀锋，做事果断，绝不拖泥带水。

这种格局的缺点也很明显——孤。紫微是孤君，七杀是孤将。你这辈子在决策上往往是孤独的。你会发现，身边能真正跟上你节奏的人很少。你必须学会“藏锋”，如果不学会以柔克刚，你的刚烈性格会让你在巅峰时期突然折断。记住，剑越利，越需要剑鞘。

【叁 · 财富深度报告：武曲化权，财路在动】

谈到钱，阿盛，你必须注意你的财帛宫。武曲星坐镇，且遇庚干化权。
武曲是正财星，属金。武曲化权，代表你对金钱的掌控欲极强，且你的财不是靠偏门左道，而是靠实实在在的专业技能和管理手腕。
我告诉你，武曲化权的人最适合做跨国贸易、重工业、金融管理或者是需要极强执行力的实干行业。你的财运在“动”中求。你绝对不能坐在办公室里等钱，你要走出去，去竞争，去拿回属于你的资源。

因为你命局金重，所以你的财库非常硬。但要小心，武曲金受丙火克。这意味着你的财富来得快，如果你守不住心里的那把火，去进行赌博式的投机，火会直接熔了你的金。你最好的守财方式是“化财为产”，把流动的资金变成实体的产业或是不动产。

【肆 · 感情深度报告：破军坐镇，因果先破】

感情，是你这辈子最大的功课。看你的夫妻宫，破军星。
破军，化气为“耗”。破军在夫妻宫，倪师的断语通常是一句话：先破后成。这意味着你早年的感情经历往往是惨烈的，可能是因为你的性格太刚，也可能是因为对方太强。你和另一半的相处，就像两块铁在碰撞，火星四射。

我建议你，一定要晚婚。破军的特性是摧毁之后再重建。如果你在心智不成熟、火气最旺的时期结婚，那段婚姻很难走到头。你的另一半通常是一个极有个性、甚至有些叛逆的人。你们的关系需要大量的空间。
记住倪师的话：名位相等。如果你能把爱人的位置摆正，不要用对下属的那套指令去对家人，你的家庭才能稳。感情不是战场，不需要紫微七杀的统御力，需要的是太阴的柔水。

【伍 · 地纪开运：乾位命门，震位发力】

命好不如位好。你是1980年生人，长男。
你的命门在西北角（乾位）。听清楚了，如果你现在的住处西北角是厕所或厨房，你的事业就会像被火烧、被水淹一样，反反复复。西北位必须高耸、整洁，最好是你的书房或主卧。
另外，你是庚寅时生。寅木代表你的生机。家中的正东方向（震位）绝对不能阴暗。你要在正东放一些常青的阔叶植物。木生火，火炼金。正东位的生气能带动你整个人生的运化逻辑。

【陆 · 人纪修身：心医之道，仁者无敌】

丙午日生人，最容易伤的是肺和大肠（金）。因为火太旺了，金受不了。
倪师的中医方剂学里，你这种人需要“润”。平时多吃白色的食物，养好你的肺。肺气足，你的声音才会亮，说话才有分量。
更重要的是修心。你养 MONEY，这很好。猫的灵动能化解你的肃杀之气。当你觉得心里燥热、想要发火的时候，去抱抱猫，感受一下那种柔软。那是天赐给你的“水”气，用来熄灭你的无名火。

阿盛，这份 2500 字的报告，字字千金。你要反反复复地读。你的格局极大，但风险也极大。守住你的位，修好你的心，这把“火炼秋金”的绝世宝剑，必将在你四十岁后的大运中，劈开属于你的乾坤大路！
`;

        function calculatePalaces() {
            const timeIndex = EARTHLY_BRANCHES.indexOf(state.time);
            const monthInt = parseInt(state.month);
            const mingGongIdx = (monthInt - 1 - timeIndex + 12) % 12; 
            const shenGongIdx = (monthInt - 1 + timeIndex) % 12;
            
            let result = [];
            for (let i = 0; i < 12; i++) {
                const name = PALACES_NAMES[(i - mingGongIdx + 12) % 12];
                const stars = [];
                if (name === "命宫") stars.push({name:"紫微"}, {name:"七杀"});
                if (name === "财帛") stars.push({name:"武曲"});
                if (name === "官禄") stars.push({name:"廉贞"});
                if (name === "夫妻") stars.push({name:"破军"});
                
                result.push({
                    branch: EARTHLY_BRANCHES[(i + 2) % 12],
                    stem: HEAVENLY_STEMS[(2 + i) % 10],
                    name,
                    stars,
                    isMingGong: name === "命宫",
                    isShenGong: i === shenGongIdx,
                    daYun: `${i * 10 + 5} - ${i * 10 + 14}`
                });
            }
            return result;
        }

        function renderChart() {
            const palaces = calculatePalaces();
            const grid = document.getElementById('palace-grid');
            grid.innerHTML = '';
            const order = [5, 6, 7, 8, 4, 'center', 9, 3, 'center', 10, 2, 1, 0, 11];
            
            order.forEach(idx => {
                if (idx === 'center') {
                    if (!grid.querySelector('.center-mark')) {
                        const c = document.createElement('div');
                        c.className = 'center-mark col-span-2 row-span-2 bg-[#fdfaf2] border-8 border-double border-red-900/20 rounded-[4rem] flex flex-col items-center justify-center p-8 shadow-inner';
                        c.innerHTML = `<h3 class="text-7xl font-black text-slate-900 mb-4 tracking-tighter">紫微</h3>
                                       <div class="grid grid-cols-4 gap-4 px-4 py-4 bg-white/40 rounded-3xl border border-red-900/5 mb-4">
                                            <div class="flex flex-col"><span class="text-[9px] text-slate-400 font-black">年柱</span><span class="text-sm font-black">庚申</span></div>
                                            <div class="flex flex-col"><span class="text-[9px] text-slate-400 font-black">月柱</span><span class="text-sm font-black text-slate-800">乙酉</span></div>
                                            <div class="flex flex-col"><span class="text-[9px] text-red-400 font-black">日柱</span><span class="text-sm font-black text-red-900">丙午</span></div>
                                            <div class="flex flex-col"><span class="text-[9px] text-slate-400 font-black">时柱</span><span class="text-sm font-black">${state.time}时</span></div>
                                       </div>`;
                        grid.appendChild(c);
                    }
                    return;
                }
                const p = palaces[idx];
                const card = document.createElement('div');
                card.className = `palace-card relative border p-2 h-40 md:h-48 flex flex-col justify-between transition-all ${p.isMingGong ? 'bg-red-50/70 border-red-700 ring-2 ring-red-700/20' : 'bg-[#fffcf5] border-slate-300'}`;
                card.innerHTML = `<div class="flex justify-between items-start">
                    <span class="text-[11px] font-black px-2 py-0.5 rounded ${p.isMingGong ? 'bg-red-700 text-white' : 'bg-slate-800 text-white'}">${p.name} ${p.isShenGong ? '身' : ''}</span>
                    <span class="text-[12px] font-black text-red-900">${p.stem}${p.branch}</span>
                </div>
                <div class="flex flex-grow items-center justify-center gap-2">
                    ${p.stars.map(s => `<span class="text-lg font-black text-red-900 writing-vertical-lr tracking-tighter">${s.name}</span>`).join('')}
                </div>
                <span class="text-[9px] text-slate-400 font-mono tracking-tighter">${p.daYun} 岁</span>`;
                grid.appendChild(card);
            });
            lucide.createIcons();
            document.getElementById('detailed-analysis-text').textContent = MASTER_ANALYSIS;
        }

        function switchTab(tab) {
            document.getElementById('view-chart').className = tab === 'chart' ? 'block overflow-x-auto pb-6 custom-scrollbar' : 'hidden';
            document.getElementById('view-analysis').className = tab === 'analysis' ? 'block space-y-12 pr-4 max-h-[800px] overflow-y-auto custom-scrollbar' : 'hidden';
            document.querySelectorAll('.tab-btn').forEach(b => b.className = "tab-btn px-12 py-3.5 rounded-[2rem] text-sm font-black transition-all text-slate-400");
            document.getElementById(`tab-${tab}`).className = "tab-btn px-12 py-3.5 rounded-[2rem] text-sm font-black transition-all bg-white text-red-950 shadow-2xl scale-105";
        }

        function shareToWhatsApp() {
            const text = `【倪氏天纪 2500字详批预览 · ${state.name}】\n\n核心断语：庚申年火炼秋金，紫杀化权，英雄开路。财帛武曲化权，感情先破后成。详批全文见附件 PDF。`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        function prepareAndPrint() {
            document.getElementById('print-user-info').innerHTML = `
                <div class="flex justify-between"><span>名讳：${state.name}</span><span>性别：${state.gender === '男' ? '乾造' : '坤造'}</span></div>
                <div class="flex justify-between"><span>四柱：庚申 乙酉 丙午 ${state.time}时</span><span>局数：木三局</span></div>
            `;
            document.getElementById('print-grid').innerHTML = document.getElementById('palace-grid').innerHTML;
            
            const printContent = document.getElementById('print-content');
            // Split analysis into distinct pages or sections for 2500 words
            const sections = MASTER_ANALYSIS.split('\n\n');
            printContent.innerHTML = sections.map((s, idx) => `
                <div class="${idx % 3 === 0 && idx !== 0 ? 'page-break' : ''} mb-12">
                    <div class="text-2xl leading-[2.6] text-slate-800 whitespace-pre-wrap font-serif">${s}</div>
                </div>
            `).join('');
            
            window.print();
        }

        ['name', 'gender', 'time', 'year', 'month', 'day'].forEach(id => {
            document.getElementById(`input-${id}`).addEventListener('change', (e) => {
                state[id] = e.target.value;
                renderChart();
            });
        });

        window.onload = renderChart;
    </script>
</body>
</html>
