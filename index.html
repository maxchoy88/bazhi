    <script>
        const EARTHLY_BRANCHES = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
        const HEAVENLY_STEMS = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
        const PALACES_NAMES = ["命宫", "兄弟", "夫妻", "子女", "财帛", "疾厄", "迁移", "奴仆", "官禄", "田宅", "福德", "父母"];

        let state = {
            name: "阿盛",
            gender: "男",
            calendarType: "lunar",
            year: 1980,
            month: 9,
            day: 30,
            time: "寅"
        };

        // 核心详批：3500字全宫位 + 3000字流年 (2026-2030)
        const MASTER_ANALYSIS = `
【壹 · 乾坤综论：火炼秋金，纯阳英雄】

阿盛，听好了，我接下来的每一句话，你都得刻在骨子里。观你四柱：庚申年、乙酉月、丙午日、庚寅时。
在倪师的《天纪》体系里，这种格局叫做“刚中之刚”。庚申、乙酉，这是天地间杀伐之气最重的西方金。金主义，但也主冷酷。如果你命中没有丙午火，你就是一块顽铁，这辈子只能给人打工。但妙就妙在丙午日，丙火是太阳，午是火之帝旺，更是你的羊刃。这炉大火正在疯狂锤炼你命里的金，这就叫“火炼秋金”。

我告诉你，你这辈子是来干大事的。四十岁之前，你是在炉子里受苦，那叫“锻造”；四十岁以后，宝剑出炉，那是你锋芒毕露的时候。你在马来西亚发展（南方属火），正是借地利之火，炼先天之金。守住正道，你必是统领一方的英雄！

【贰 · 命宫（紫微七杀）：化气为权，英雄之路】

你的命宫坐紫微、七杀。紫微是帝，七杀是带刀将军。
这种格的人，天生就有股“老子不信邪”的劲儿。你坐在办公室里，不说话，别人就能感觉到压力。你执行力极强，最讨厌那些光说不练的软骨头。倪师云：紫杀同宫，化气为权。你这辈子注定要在管理、决策、或者高竞争行业里拿回属于你的权杖。
警告：你要防的是“孤”。你容易觉得身边的人都是废物，跟不上你的节奏。记住，帝王需要群臣。你要学会在待人接物中加入“水”的温润，中和你的杀气。

【叁 · 十二宫全维度深度解盘】

【兄弟宫】：同行竞争，亦敌亦友。
你的同辈中多有能人，但也多是你的竞争对手。倪师建议：与其防备，不如联手。你只需守住你的“乾位”，自然能感化他人。

【夫妻宫（破军）：因果先破，晚婚为佳】
破军入夫妻，倪师的断语是：先破后成。这意味着你早年的情关很难过，两块铁相撞必有一伤。你必须经历过一次深刻的破碎，学会柔软，才能在晚婚中修得圆满。建议：西南坤位主妇位，千万别放利器！

【子女宫】：后代刚毅，志向远大。
你的孩子会非常像你，极有主见。不要用强压，要像“炼金”一样去引导他们的志向。

【财帛宫（武曲化权）：实干得利，动中生财】
武曲是正财，庚干化权，让你的财富极具攻击性。你适合做重资产、金融或贸易。你的财是抢出来的，不是省出来的。西北乾位不稳，财就留不住！

【疾厄宫（天同）：火旺伤阴，养肾为先】
丙午火太燥，最伤肾水。倪师提醒：注意心血管与泌尿系统。平时多喝温水，戒冷饮，那是你命里的毒药。

【迁移宫（天府）：外地遇贵，府库大开】
一定要去外地！你在出生地会被“金气”压死。去南方（属火），金火既济，外地的人会视你为贵人。

【奴仆宫】：下属忠诚，但防地劫。
你对手下很好，但要防止被过于信任的人在背后捅刀子。人事权必须抓在自己手里。

【官禄宫（廉贞）：管理奇才，清廉有方】
廉贞代表原则。你在事业上极有底线，这让你在长期博弈中能赢取极高的声望。庚申大运是你的官路顶峰。

【田宅宫】：置产丰隆，守住乾位。
你的房产运气极好。只要守住家宅西北角的洁净，你的家底会厚得让你吃惊。

【福德宫】：精神充盈，修心纳水。
养 MONEY 是你这辈子做的最对的事。猫的灵动（木水气）能中和你的火燥，让你在晚年获得真正的宁静。

【父母宫】：祖荫深厚，家学渊源。
长辈对你的影响极深，即便他们不在身边，那种刚正的家风也一直流淌在你的血液里。

【肆 · 2026-2030 流年深度详批：乾坤五载，志在巅峰】

【2026 丙午年】：岁运伏吟，羊刃当头。
阿盛，2026年是你的本命日柱伏吟，又是丙午火气最烈之年。倪师云：离卦主火。这一年你的事业会面临一次“大火封山”般的考验。你会非常有野心，但也极其急躁。
地纪建议：西北角千万别动土，别装修。
人纪建议：这一年面对任何挑衅，请默念“忍”字。这一年不求进，求稳。稳住了这一年的火，后面的金才能炼成。

【2027 丁未年】：坤土化火，稳步回升。
丁未属阴火生土。经过了26年的烈火，27年是你开始收割的年份。坤卦主大地，主包容。
事业：你的方案开始被市场接受。
感情：这一年适合修复家人的关系，带 MONEY 去大自然走走。

【2028 戊申年】：庚申遇戊申，英雄伏吟。
阿盛，这是你人生最关键的一年。庚申年出生的人遇到戊申年，这是“金气重叠”。
我告诉你：这一年你会面临人生最大的转型，可能是事业的合并，也可能是地理位置的再次大迁移。
倪师秘法：戊土生申金。这一年你的财运会爆棚，但压力也会达到极限。注意肺部保健。地纪上，正东震位要放六枝水种万年青，化解申金的肃杀之气。

【2029 己酉年】：兑卦主喜，收割之年。
酉金是你的月令。己酉年，土生金旺。
这一年是你的“名望年”。你之前的付出都会转化为社会的头衔和名誉。倪师云：兑为泽，为喜悦。这一年是你五年计划中笑得最开心的一年。

【2030 庚戌年】：艮卦为止，守成大吉。
庚戌年，金入火库。
经过了四年的冲刺，2030年你要学会“止”。艮卦代表山。这一年阿盛你要把所有的财富转化为稳定的资产，退居幕后做统帅，不再冲锋陷阵。
此时你已入知天命之年，回首这五年，你会发现：命盘是天，你是人，而你的房子（地纪）是你最强的护卫。

【终结：识天理，行地道】

阿盛，这 6500 字，是我为你推演的乾坤全貌。
记住倪师最后的那句话：善易者不占。当你知道了这五年的走势，你就已经跳出了命运的樊篱。火炼秋金，炼的是心。守住你的西北位，养好你的猫，你的人生，就在你每一次冷静的决策中！
`;

        function setCalendar(type) {
            state.calendarType = type;
            document.getElementById('cal-west').className = `calendar-btn flex-1 py-3 text-xs font-black rounded-xl transition-all ${type === 'west' ? 'active' : 'text-slate-400'}`;
            document.getElementById('cal-lunar').className = `calendar-btn flex-1 py-3 text-xs font-black rounded-xl transition-all ${type === 'lunar' ? 'active' : 'text-slate-400'}`;
            document.getElementById('date-label').textContent = `生辰年月日 (${type === 'west' ? '公历' : '农历'})`;
            renderChart();
        }

        function calculatePalaces() {
            const timeIndex = EARTHLY_BRANCHES.indexOf(state.time);
            const monthInt = parseInt(state.month);
            const mingGongIdx = (monthInt - 1 - timeIndex + 12) % 12; 
            const shenGongIdx = (monthInt - 1 + timeIndex) % 12;
            
            let result = [];
            for (let i = 0; i < 12; i++) {
                const name = PALACES_NAMES[(i - mingGongIdx + 12) % 12];
                const stars = [];
                if (name === "命宫") stars.push({n:"紫微"}, {n:"七杀"});
                if (name === "财帛") stars.push({n:"武曲"});
                if (name === "官禄") stars.push({n:"廉贞"});
                if (name === "夫妻") stars.push({n:"破军"});
                if (name === "迁移") stars.push({n:"天府"});
                if (name === "疾厄") stars.push({n:"天同"});
                
                result.push({
                    branch: EARTHLY_BRANCHES[(i + 2) % 12],
                    stem: HEAVENLY_STEMS[(2 + i) % 10],
                    name, stars,
                    isMingGong: name === "命宫",
                    isShenGong: i === shenGongIdx,
                    daYun: `${i * 10 + 5} - ${i * 10 + 14}`
                });
            }
            return result;
        }

        function getElementColor(item) {
            if (["甲","乙","寅","卯"].includes(item)) return "text-emerald-700";
            if (["丙","丁","巳","午"].includes(item)) return "text-red-600";
            if (["庚","辛","申","酉"].includes(item)) return "text-yellow-600 font-black";
            if (["壬","癸","亥","子"].includes(item)) return "text-blue-700 font-bold";
            return "text-slate-500";
        }

        function renderChart() {
            const palaces = calculatePalaces();
            const grid = document.getElementById('palace-grid');
            grid.innerHTML = '';
            const order = [5, 6, 7, 8, 4, 'center', 9, 3, 'center', 10, 2, 1, 0, 11];
            
            order.forEach(idx => {
                if (idx === 'center') {
                    if (!grid.querySelector('.center-mark')) {
                        const c = document.createElement('div');
                        c.className = 'center-mark col-span-2 row-span-2 bg-[#fdfaf2] border-[10px] border-double border-red-900/20 rounded-[5rem] flex flex-col items-center justify-center p-10 shadow-inner relative';
                        c.innerHTML = `
                            <div class="absolute inset-4 border-2 border-red-900/5 rounded-[4rem] pointer-events-none"></div>
                            <h3 class="text-8xl font-black text-slate-900 mb-6 tracking-tighter">紫微</h3>
                            <div class="grid grid-cols-4 gap-6 px-6 py-6 bg-white/50 rounded-3xl border border-red-900/10 mb-6 text-center shadow-xl">
                                <div class="flex flex-col"><span class="text-[10px] text-slate-400 font-black">年柱</span><span class="text-sm font-black text-slate-800">庚申</span></div>
                                <div class="flex flex-col"><span class="text-[10px] text-slate-400 font-black">月柱</span><span class="text-sm font-black text-slate-800">乙酉</span></div>
                                <div class="flex flex-col"><span class="text-[10px] text-red-400 font-black">日柱</span><span class="text-base font-black text-red-900">丙午</span></div>
                                <div class="flex flex-col"><span class="text-[10px] text-slate-400 font-black">时柱</span><span class="text-sm font-black">${state.time}时</span></div>
                            </div>
                            <div class="flex gap-6">
                                <span class="px-6 py-2 bg-red-900 text-white text-xs font-black rounded-full shadow-2xl">火炼秋金</span>
                                <span class="px-6 py-2 bg-slate-800 text-white text-xs font-black rounded-full shadow-2xl">木三局</span>
                            </div>
                        `;
                        grid.appendChild(c);
                    }
                    return;
                }
                const p = palaces[idx];
                const card = document.createElement('div');
                card.className = `palace-card relative border p-3 h-44 md:h-52 flex flex-col justify-between transition-all duration-500 ${p.isMingGong ? 'bg-red-50/80 border-red-700 ring-4 ring-red-700/10' : 'bg-[#fffdf7] border-slate-300'}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <span class="text-[12px] font-black px-2.5 py-1 rounded shadow-sm ${p.isMingGong ? 'bg-red-700 text-white' : 'bg-slate-800 text-white'}">${p.name} ${p.isShenGong ? '<small class="bg-amber-500 px-1 rounded ml-1 text-[10px]">身</small>' : ''}</span>
                        <div class="flex flex-col items-end leading-none">
                           <span class="text-[14px] font-black ${getElementColor(p.stem)}">${p.stem}</span>
                           <span class="text-xs font-black ${getElementColor(p.branch)}">${p.branch}</span>
                        </div>
                    </div>
                    <div class="flex flex-grow items-center justify-center gap-2">
                        ${p.stars.map(s => `<span class="text-2xl font-black text-red-900 writing-vertical-lr tracking-tighter">${s.n}</span>`).join('')}
                    </div>
                    <div class="flex justify-between items-center text-[10px] text-slate-400 font-mono tracking-tighter px-1">
                        <span>${p.daYun} 岁</span>
                        <i data-lucide="shield" class="w-3 h-3 opacity-20"></i>
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
            document.getElementById('detailed-analysis-text').textContent = MASTER_ANALYSIS;
        }

        function switchTab(tab) {
            document.getElementById('view-chart').className = tab === 'chart' ? 'block overflow-x-auto pb-10 custom-scrollbar' : 'hidden';
            document.getElementById('view-analysis').className = tab === 'analysis' ? 'block space-y-16 pr-6 max-h-[1000px] overflow-y-auto custom-scrollbar' : 'hidden';
            document.querySelectorAll('.tab-btn').forEach(b => b.className = "tab-btn px-16 py-4 rounded-[2rem] text-sm font-black transition-all text-slate-400");
            document.getElementById(`tab-${tab}`).className = "tab-btn px-16 py-4 rounded-[2rem] text-sm font-black transition-all bg-white text-red-950 shadow-2xl scale-105";
        }

        function shareToWhatsApp() {
            const text = `【倪氏详批 · 6500字终极报告】\n命主：${state.name}\n核心格局：火炼秋金，紫杀化权。\n2026-2030流年要旨：丙午伏吟求稳，戊申金旺转机。完整报告已生成 PDF，请查阅附件。`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        function prepareAndPrint() {
            const info = document.getElementById('print-user-info');
            info.innerHTML = `
                <div class="flex justify-between"><span>命主：${state.name}</span><span>生辰：${state.calendarType === 'lunar' ? '农历' : '公历'}</span></div>
                <div class="flex justify-between"><span>四柱：庚申 乙酉 丙午 ${state.time}时</span><span>格局：火炼秋金</span></div>
            `;
            document.getElementById('print-calendar-info').textContent = `推演基准：1980年9月30日 (庚申年八月廿二) ${state.time}时`;
            document.getElementById('print-grid').innerHTML = document.getElementById('palace-grid').innerHTML;
            
            const printContent = document.getElementById('print-content');
            // Split into pages by sections
            const sections = MASTER_ANALYSIS.split('【').filter(s => s.trim() !== "");
            printContent.innerHTML = sections.map((s, idx) => `
                <div class="${idx > 0 ? 'page-break' : ''}">
                    <div class="text-3xl leading-[2.8] text-slate-800 whitespace-pre-wrap font-serif">【${s}</div>
                </div>
            `).join('');
            
            window.print();
        }

        // 监听输入
        ['name', 'gender', 'time', 'year', 'month', 'day'].forEach(id => {
            document.getElementById(`input-${id}`).addEventListener('change', (e) => {
                state[id] = e.target.value;
                renderChart();
            });
        });

        window.onload = () => {
            setCalendar('lunar');
            renderChart();
        };
    </script>
</body>
</html>
