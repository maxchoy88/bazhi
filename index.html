    <script>
        const EARTHLY_BRANCHES = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
        const HEAVENLY_STEMS = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
        const PALACES_NAMES = ["命宫", "兄弟", "夫妻", "子女", "财帛", "疾厄", "迁移", "奴仆", "官禄", "田宅", "福德", "父母"];

        let state = {
            name: "阿盛",
            gender: "男",
            calendarType: "lunar", // Default to lunar
            year: 1980,
            month: 9,
            day: 30,
            time: "寅"
        };

        const MASTER_ANALYSIS = `
【壹 · 乾坤综论：火炼秋金，英雄绝响】

阿盛，听好了。观你四柱：庚申年、乙酉月、丙午日、庚寅时。
在倪师的体系中，这是一个极度纯粹且带有肃杀之气的格局。申酉金气在月令达到了巅峰，这代表你的根基深厚，但金气太重则刚，容易折断。妙就妙在丙午日元，太阳之火带着羊刃，正在这金矿中疯狂锤炼。
我告诉你，你这辈子不是来享福的，你是来开路的。火炼秋金，练成了就是绝世神剑，练不成就是一滩废铁。你人生前三十年都在“炉中”，受尽磨砺；四十岁后金火既济，方能名震八方。

【贰 · 命宫（紫微七杀）：帝将同宫，化气为权】

你的命宫坐紫微、七杀。紫微是帝星，七杀是带刀的将军。
这种格叫“化气为权”。你天生就不服输，骨子里透着一股统御力。你坐在那里，不说话，别人就能感觉到你的气场。倪师云：紫杀同宫，最喜见禄。你的财帛宫武曲化权，正应了“将星得地”。
警告：紫杀之人最忌“孤”。你总是觉得身边的人不如你，执行力跟不上你。记住，帝王需要群臣，将军需要士兵。你要学会在人际中加入“水”的成分，中和你的火性。

【叁 · 财帛宫（武曲化权）：实干之财，动中求胜】

武曲是财星，属金。庚干化权，让你的财富极具攻击性。
你的财不是靠省出来的，是靠抢出来的。你是商战里的好手，最适合重工业、金融、国际贸易。凡是需要果断决策的行业，都是你的提款机。
财帛地纪建议：西北乾位必须稳。如果你现在的办公桌背靠大窗，或者背后悬空，你的武曲金就会流失。背后要有靠，最好是实墙。

【肆 · 夫妻宫（破军）：因果先破，晚婚为佳】

破军在夫妻宫，化气为“耗”。倪师的断语一向直接：先破后成。
你早年的感情经历一定让你痛过。因为你太刚，对方也不弱。两块铁相撞，最后只能两败俱伤。我建议你，一定要晚婚。等你的丙午火性收敛了，等你的紫微帝星懂得慈悲了，你才能遇到那个能共度余生的人。
另一半通常性格刚毅，有主见。建议在家中西南坤位（主妇位）摆放白色陶瓷，调和木金之气。

【伍 · 官禄宫（廉贞）：清廉有守，管理之才】

廉贞入官禄，你是个极有原则的人。在事业上，你绝对不会同流合污。
倪师云：廉贞是囚星，也是次桃花。你在管理岗位上，能把下属管得服服帖帖，但要注意不要因为权力欲望太重而产生“官非”。你的事业上升期在庚申大运，那时候你的廉贞会发出最耀眼的光芒。

【陆 · 疾厄宫（天同）：水火不容，肾气为要】

丙午日生人，火大伤阴。天同在疾厄，主肾、主水。
火太旺，水就会被烧干。倪师提醒你：要注意泌尿系统和心脏压力。平时多喝温水，千万不要吃冷饮（那是在灭你的丙火元气，同时激荡肾水）。
人纪养生：每天子时（23点）前必须睡觉。火大的人，熬夜就是自焚。

【柒 · 迁移宫（天府）：外地遇贵，府库充盈】

迁移宫见天府，那是厚重的财库。
这意味着阿盛你这辈子一定要去外地发展，走得越远，财越大。你在出生地会被“庚申金”压制，但到了外地，天府的包容力会让你如鱼得水。你在马来西亚（南方属火）的发展，正合你的丙午日元，火旺则金成。

【捌 · 兄弟宫：同行竞争，亦敌亦友】

你的兄弟宫显示你与同辈人的关系比较微妙。
虽然大家表面客气，但暗地里的竞争从未停止。因为你太优秀，别人会把你当成假想敌。建议你“外圆内方”，表面多赞美他人，内心守住自己的准则。

【玖 · 子女宫：后代刚毅，悉心教导】

你的子女会承袭你的刚毅之气。
他们从小就有主见，不好管。倪师建议：对这种孩子，不能硬压，要像“炼金”一样，引导他们的志向。他们将来必是某一领域的佼佼者。

【拾 · 奴仆宫（交友）：择友需慎，莫养虎患】

由于你位高权重（紫杀），身边会有很多依附你的人。
但要小心其中有“地劫”或“地空”的影响。不要轻易为他人作保，更不要随便借大笔资金出去。你的贵人在长辈，不在同辈。

【拾壹 · 田宅宫：置产丰厚，稳守乾位】

你在房产上的运气不错。武曲化权不仅在财帛，也照拂你的田宅。
你适合购买地势较高、或者结构方正的现代住宅。再次强调：西北角（乾位）不可受损！这是阿盛你这辈子的命门所在。

【拾贰 · 福德宫：精神富足，修心为上】

你的晚年福德非常深厚。
虽然年轻时奔波，但你有一颗能够静下来的心。倪师常说，最后拼的是“德”。你养 MONEY，照顾弱小生命，就是在积攒你的福德水，来平衡你的命局燥气。

【总结：识天地之理，运人纪之志】

阿盛，这 3500 字是你命局的缩影。
你要知道，命盘是“天纪”，阳宅是“地纪”，决策是“人纪”。
你现在身处南方火地（马来西亚），正是“火炼秋金”的最佳场所。守住西北位，克制火爆脾气，你必能从一名英雄，进阶为一名统帅。记住：善易者不占，明白了这个理，命就在你手里！
`;

        function setCalendar(type) {
            state.calendarType = type;
            document.getElementById('cal-west').className = `calendar-btn flex-1 py-2 text-xs font-black rounded-xl transition-all ${type === 'west' ? 'active' : 'text-slate-400'}`;
            document.getElementById('cal-lunar').className = `calendar-btn flex-1 py-2 text-xs font-black rounded-xl transition-all ${type === 'lunar' ? 'active' : 'text-slate-400'}`;
            document.getElementById('date-label').textContent = `生辰年月日 (${type === 'west' ? '西历' : '农历'})`;
            renderChart();
        }

        function calculatePalaces() {
            // Simplified calculation logic (fixed seed for Castor)
            const timeIndex = EARTHLY_BRANCHES.indexOf(state.time);
            const mingGongIdx = (parseInt(state.month) - 1 - timeIndex + 12) % 12; 
            const shenGongIdx = (parseInt(state.month) - 1 + timeIndex) % 12;
            
            let result = [];
            for (let i = 0; i < 12; i++) {
                const name = PALACES_NAMES[(i - mingGongIdx + 12) % 12];
                const stars = [];
                if (name === "命宫") stars.push({n:"紫微", t:"main"}, {n:"七杀", t:"main"});
                if (name === "财帛") stars.push({n:"武曲", t:"main"});
                if (name === "官禄") stars.push({n:"廉贞", t:"main"});
                if (name === "夫妻") stars.push({n:"破军", t:"main"});
                if (name === "迁移") stars.push({n:"天府", t:"main"});
                if (name === "疾厄") stars.push({n:"天同", t:"main"});
                
                result.push({
                    branch: EARTHLY_BRANCHES[(i + 2) % 12],
                    stem: HEAVENLY_STEMS[(2 + i) % 10],
                    name, stars,
                    isMingGong: name === "命宫",
                    isShenGong: i === shenGongIdx,
                    daYun: `${i * 10 + 5} - ${i * 10 + 14}`
                });
            }
            return result;
        }

        function getElementColor(item) {
            if (["甲","乙","寅","卯"].includes(item)) return "text-emerald-700";
            if (["丙","丁","巳","午"].includes(item)) return "text-red-600";
            if (["庚","辛","申","酉"].includes(item)) return "text-yellow-600 font-black";
            if (["壬","癸","亥","子"].includes(item)) return "text-blue-700";
            return "text-slate-500";
        }

        function renderChart() {
            const palaces = calculatePalaces();
            const grid = document.getElementById('palace-grid');
            grid.innerHTML = '';
            const order = [5, 6, 7, 8, 4, 'center', 9, 3, 'center', 10, 2, 1, 0, 11];
            
            order.forEach(idx => {
                if (idx === 'center') {
                    if (!grid.querySelector('.center-mark')) {
                        const c = document.createElement('div');
                        c.className = 'center-mark col-span-2 row-span-2 bg-[#fdfaf2] border-8 border-double border-red-900/20 rounded-[4rem] flex flex-col items-center justify-center p-8 shadow-inner';
                        c.innerHTML = `
                            <h3 class="text-7xl font-black text-slate-900 mb-4 tracking-tighter">紫微</h3>
                            <div class="grid grid-cols-4 gap-4 px-4 py-4 bg-white/40 rounded-3xl border border-red-900/5 mb-4 text-center">
                                <div class="flex flex-col"><span class="text-[9px] text-slate-400 font-black">年柱</span><span class="text-sm font-black">庚申</span></div>
                                <div class="flex flex-col"><span class="text-[9px] text-slate-400 font-black">月柱</span><span class="text-sm font-black">乙酉</span></div>
                                <div class="flex flex-col"><span class="text-[9px] text-red-400 font-black">日柱</span><span class="text-sm font-black text-red-900">丙午</span></div>
                                <div class="flex flex-col"><span class="text-[9px] text-slate-400 font-black">时柱</span><span class="text-sm font-black">${state.time}时</span></div>
                            </div>
                            <div class="flex gap-4">
                                <span class="px-4 py-1 bg-red-900 text-white text-[10px] rounded-full shadow-lg">火炼秋金</span>
                                <span class="px-4 py-1 bg-slate-800 text-white text-[10px] rounded-full shadow-lg">木三局</span>
                            </div>
                        `;
                        grid.appendChild(c);
                    }
                    return;
                }
                const p = palaces[idx];
                const card = document.createElement('div');
                card.className = `palace-card relative border p-2 h-40 md:h-48 flex flex-col justify-between transition-all ${p.isMingGong ? 'bg-red-50/70 border-red-700 ring-2 ring-red-700/20' : 'bg-[#fffcf5] border-slate-300'}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <span class="text-[11px] font-black px-2 py-0.5 rounded shadow-sm ${p.isMingGong ? 'bg-red-700 text-white' : 'bg-slate-800 text-white'}">${p.name} ${p.isShenGong ? '<small class="bg-amber-500 px-1 rounded ml-1">身</small>' : ''}</span>
                        <span class="text-[13px] font-black ${getElementColor(p.branch)}">${p.stem}${p.branch}</span>
                    </div>
                    <div class="flex flex-grow items-center justify-center gap-2">
                        ${p.stars.map(s => `<span class="text-lg font-black text-red-900 writing-vertical-lr tracking-tighter">${s.n}</span>`).join('')}
                    </div>
                    <div class="flex justify-between items-center text-[9px] text-slate-400 font-mono tracking-tighter px-1">
                        <span>大运：${p.daYun}</span>
                        <i data-lucide="shield" class="w-2 h-2 opacity-30"></i>
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
            document.getElementById('detailed-analysis-text').textContent = MASTER_ANALYSIS;
        }

        function switchTab(tab) {
            document.getElementById('view-chart').className = tab === 'chart' ? 'block overflow-x-auto pb-6 custom-scrollbar' : 'hidden';
            document.getElementById('view-analysis').className = tab === 'analysis' ? 'block space-y-12 pr-4 max-h-[900px] overflow-y-auto custom-scrollbar' : 'hidden';
            document.querySelectorAll('.tab-btn').forEach(b => b.className = "tab-btn px-12 py-3.5 rounded-[2rem] text-sm font-black transition-all text-slate-400");
            document.getElementById(`tab-${tab}`).className = "tab-btn px-12 py-3.5 rounded-[2rem] text-sm font-black transition-all bg-white text-red-950 shadow-2xl scale-105";
        }

        function shareToWhatsApp() {
            const text = `【倪氏天纪 3500字终极详批 · 阿盛】\n\n核心断语：庚申年金旺火炼，紫杀带权。财富武曲化权，感情破军先破。十二宫全维度深度报告，详见附件。`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        function prepareAndPrint() {
            const info = document.getElementById('print-user-info');
            info.innerHTML = `
                <div class="flex justify-between"><span>名讳：${state.name}</span><span>生辰：${state.calendarType === 'lunar' ? '农历' : '公历'}</span></div>
                <div class="flex justify-between"><span>四柱：庚申 乙酉 丙午 ${state.time}时</span><span>格局：火炼秋金</span></div>
            `;
            document.getElementById('print-calendar-info').textContent = `生辰基准：1980年9月30日 (农历庚申年八月廿二) ${state.time}时`;
            document.getElementById('print-grid').innerHTML = document.getElementById('palace-grid').innerHTML;
            
            const printContent = document.getElementById('print-content');
            // Split text by sections for perfect pagination
            const sections = MASTER_ANALYSIS.split('【').filter(s => s.trim() !== "");
            printContent.innerHTML = sections.map((s, idx) => `
                <div class="page-break">
                    <div class="text-2xl leading-[2.8] text-slate-800 whitespace-pre-wrap font-serif">【${s}</div>
                </div>
            `).join('');
            
            window.print();
        }

        ['name', 'gender', 'time', 'year', 'month', 'day'].forEach(id => {
            document.getElementById(`input-${id}`).addEventListener('change', (e) => {
                state[id] = e.target.value;
                renderChart();
            });
        });

        window.onload = () => {
            setCalendar('lunar'); // Start with lunar active
            renderChart();
        };
    </script>
</body>
</html>
