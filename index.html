<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>倪氏天纪紫微 6500字动态详批重装版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Serif SC', serif;
            background-color: #ece6d9;
        }
        .writing-vertical-lr {
            writing-mode: vertical-lr;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 30px;
        }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; margin: 0; padding: 0; }
            .print-only { display: block !important; }
            .print-container { 
                padding: 60px !important; 
                background: white !important; 
                min-height: 100vh;
                display: block !important;
            }
            .page-break { page-break-before: always; padding-top: 40px; border-top: 1px solid #eee; }
            .report-text { 
                font-size: 13pt !important; 
                line-height: 2.3 !important;
                text-align: justify;
                color: #111;
            }
            h1, h2, h3 { color: #7f1d1d !important; }
            .palace-grid-print { transform: scale(0.85); transform-origin: top center; }
        }
        
        .print-only { display: none; }
        
        .palace-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.1);
        }
        .loader {
            border-top-color: #7f1d1d;
            animation: spinner 0.8s linear infinite;
        }
        @keyframes spinner {
            to { transform: rotate(360deg); }
        }
        .calendar-btn.active {
            background-color: #7f1d1d;
            color: white;
            box-shadow: 0 4px 12px rgba(127, 29, 29, 0.3);
        }
    </style>
</head>
<body class="p-2 md:p-6 text-slate-900">

    <div class="max-w-7xl mx-auto space-y-6 no-print">
        <header class="bg-white border-b-[12px] border-red-950 rounded-3xl p-10 shadow-2xl flex flex-col md:flex-row justify-between items-center gap-8 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-64 h-64 bg-red-900/5 rounded-full blur-[100px]"></div>
            <div class="flex items-center gap-10 z-10">
                <div class="bg-red-950 p-8 rounded-3xl text-white shadow-2xl ring-4 ring-red-50 relative group">

                </div>
                <div>
                    <h1 class="text-4xl md:text-5xl font-black tracking-tighter text-slate-900">倪氏天纪·全动态终极详批</h1>
                    <div class="flex items-center gap-4 text-red-900 font-black text-xs mt-3 uppercase tracking-[0.4em] bg-red-50/50 w-fit px-4 py-1 rounded-full font-sans">
                        <i data-lucide="zap" class="w-3 h-3 text-red-600"></i> 分段式推演 · 6500字无损导出
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-4 z-10">
                <button id="ai-btn" class="bg-red-800 text-white px-10 py-4 rounded-2xl text-sm font-black hover:bg-black transition-all shadow-xl flex items-center gap-4 active:scale-95">
                    <i data-lucide="sparkles" class="w-5 h-5"></i>
                    分段开启 6500字 推演 ✨
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-3 space-y-6">
                <section class="bg-white rounded-[2.5rem] p-8 shadow-xl border border-slate-200">
                    <h2 class="text-xs font-black mb-8 flex items-center gap-2 text-slate-500 uppercase tracking-widest border-b border-slate-50 pb-4">
                        <i data-lucide="user" class="w-4 h-4 text-red-900"></i> 生辰档案
                    </h2>
                    <div class="space-y-6">
                        <div class="flex p-1 bg-slate-100 rounded-xl mb-4 shadow-inner">
                            <button onclick="setCalendar('west')" id="cal-west" class="calendar-btn flex-1 py-2 text-[10px] font-black rounded-lg transition-all">西历 (Solar)</button>
                            <button onclick="setCalendar('lunar')" id="cal-lunar" class="calendar-btn flex-1 py-2 text-[10px] font-black rounded-lg transition-all active">农历 (Lunar)</button>
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-400 font-black block mb-2 px-1">名讳</label>
                            <input type="text" id="input-name" value="阿盛" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl px-4 py-3 text-sm font-bold focus:border-red-900 outline-none" />
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-[10px] text-slate-400 font-black block mb-2 px-1 text-center">性别</label>
                                <select id="input-gender" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl px-3 py-3 text-sm font-bold">
                                    <option value="男">乾造 (男)</option><option value="女">坤造 (女)</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] text-slate-400 font-black block mb-2 px-1 text-center">时辰</label>
                                <select id="input-time" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl px-3 py-3 text-sm font-bold">
                                    <option value="寅">寅 (3-5)</option><option value="子">子 (23-1)</option><option value="丑">丑 (1-3)</option>
                                    <option value="卯">卯 (5-7)</option><option value="辰">辰 (7-9)</option><option value="巳">巳 (9-11)</option>
                                    <option value="午">午 (11-13)</option><option value="未">未 (13-15)</option><option value="申">申 (15-17)</option>
                                    <option value="酉">酉 (17-19)</option><option value="戌">戌 (19-21)</option><option value="亥">亥 (21-23)</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-400 font-black block mb-2 px-1">出生日期</label>
                            <div class="grid grid-cols-3 gap-2">
                                <input type="number" id="input-year" value="1980" class="bg-slate-50 border-2 border-slate-100 rounded-xl py-3 text-xs text-center font-bold" />
                                <input type="number" id="input-month" value="9" class="bg-slate-50 border-2 border-slate-100 rounded-xl py-3 text-xs text-center font-bold" />
                                <input type="number" id="input-day" value="30" class="bg-slate-50 border-2 border-red-200 rounded-xl py-3 text-xs text-center font-black text-red-900" />
                            </div>
                        </div>
                    </div>
                </section>
                <section class="bg-red-950 rounded-[2.5rem] p-10 text-red-50 shadow-2xl relative overflow-hidden">
                    <i data-lucide="award" class="absolute -right-4 -bottom-4 w-24 h-24 text-white/5 opacity-20"></i>
                    <h2 class="text-xs font-black mb-6 text-red-400 uppercase tracking-widest">倪师秘要</h2>
                    <p class="text-sm leading-relaxed italic opacity-80 font-serif">“大道至简。分段推演，旨在将复杂的命局理顺。3500字论格，3000字论运，方为大成。”</p>
                </section>
            </div>

            <div class="lg:col-span-9 space-y-6">
                <div class="bg-white rounded-[3.5rem] p-8 md:p-12 shadow-2xl border border-slate-200 min-h-[850px]">
                    <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-8">
                        <div class="flex p-2 bg-slate-100 rounded-[2rem] shadow-inner w-fit">
                            <button onclick="switchTab('chart')" id="tab-chart" class="tab-btn px-12 py-3.5 rounded-[1.5rem] text-sm font-black transition-all bg-white text-red-950 shadow-2xl scale-105">天机命阵图</button>
                            <button onclick="switchTab('analysis')" id="tab-analysis" class="tab-btn px-12 py-3.5 rounded-[1.5rem] text-sm font-black transition-all text-slate-400">详批全文 (6500字)</button>
                        </div>
                        <button onclick="prepareAndPrint()" class="bg-slate-900 text-white px-12 py-4 rounded-2xl text-sm font-black hover:bg-black shadow-2xl flex items-center gap-4 transition-all">
                            <i data-lucide="printer" class="w-5 h-5 text-red-500"></i> 导出 6500字 深入报告
                        </button>
                    </div>

                    <div id="view-chart" class="block overflow-x-auto pb-10 custom-scrollbar">
                        <div id="palace-grid" class="min-w-[850px] grid grid-cols-4 grid-rows-4 gap-4 p-4 bg-slate-50/50 rounded-[3rem]"></div>
                    </div>

                    <div id="view-analysis" class="hidden space-y-12 pr-6 max-h-[1000px] overflow-y-auto custom-scrollbar font-serif">
                        <div id="ai-response-container" class="hidden space-y-8">
                            <div class="bg-amber-50 p-12 rounded-[4rem] border-2 border-amber-200 shadow-xl relative">
                                <div class="flex justify-between items-center mb-10 border-b-2 border-amber-100 pb-8">
                                    <h4 class="text-3xl font-black text-amber-900 flex items-center gap-4">
                                        <i data-lucide="feather" class="w-10 h-10 text-amber-600"></i> 倪师全动态终极详批
                                    </h4>
                                    <div class="flex gap-4">
                                        <button onclick="shareToWhatsApp()" class="bg-green-600 text-white px-6 py-3 rounded-2xl text-sm font-black flex items-center gap-3 shadow-lg hover:bg-green-700 transition-all">
                                            <i data-lucide="message-circle" class="w-5 h-5"></i> 分享 WhatsApp
                                        </button>
                                        <button id="tts-btn" class="bg-amber-600 text-white p-4 rounded-full hover:bg-amber-700 shadow-xl transition-all hover:scale-110">
                                            <i data-lucide="volume-2" class="w-6 h-6"></i>
                                        </button>
                                    </div>
                                </div>
                                <p id="ai-text" class="text-xl text-amber-950 leading-[2.6] whitespace-pre-wrap pl-8 border-l-4 border-amber-200"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 打印预览区 -->
    <div id="print-report" class="print-only print-container font-serif">
        <div class="max-w-4xl mx-auto">
            <div class="text-center border-b-[20px] border-double border-red-900 pb-20 mb-24">
                <div class="flex justify-center mb-12">
                    <div class="w-32 h-32 border-8 border-red-900 rounded-[2.5rem] flex items-center justify-center rotate-45 shadow-2xl bg-white">
                       <i data-lucide="compass" class="w-20 h-20 text-red-950 -rotate-45"></i>
                    </div>
                </div>
                <h1 class="text-8xl font-black text-slate-900 mb-10 tracking-tighter italic">倪氏天纪·动态详批</h1>
                <h2 class="text-4xl font-bold text-red-900 mb-12 tracking-[1em] uppercase">六千五百字 终极馆藏本</h2>
                <div id="print-user-info" class="mt-20 grid grid-cols-2 gap-12 text-2xl font-black text-slate-600 border-y-4 border-slate-100 py-12 px-8"></div>
            </div>

            <div class="page-break space-y-12 py-20 text-center">
                <h2 class="text-5xl font-black border-l-[20px] border-red-950 pl-10 mb-20 text-left uppercase tracking-widest">命理动态布阵图</h2>
                <div id="print-grid" class="palace-grid-print grid grid-cols-4 grid-rows-4 gap-4 border-4 border-slate-300 p-8 rounded-[4rem] bg-[#fdfaf2] shadow-inner"></div>
            </div>

            <div id="print-content" class="report-text space-y-24 py-20"></div>

            <div class="mt-48 pt-24 border-t-8 border-double border-slate-100 text-center text-slate-300">
                <p class="text-4xl italic mb-16 text-slate-400">“心医胜中医，位正方能命顺。”</p>
                <div class="flex justify-center gap-12 opacity-10 mb-16 grayscale">
                    <i data-lucide="shield" class="w-12 h-12"></i>
                    <i data-lucide="compass" class="w-24 h-24"></i>
                    <i data-lucide="award" class="w-12 h-12"></i>
                </div>
                <p class="text-sm font-black tracking-[2em] uppercase">— 倪氏门人 波 (Bo) 谨呈 —</p>
            </div>
        </div>
    </div>

    <!-- 加载器 -->
    <div id="global-loader" class="hidden fixed inset-0 bg-slate-950/98 backdrop-blur-3xl z-[100] flex flex-col items-center justify-center px-10 text-center">
        <div class="loader ease-linear rounded-full border-[12px] border-t-[12px] border-slate-200 h-36 w-36 mb-16 shadow-[0_0_120px_rgba(255,255,255,0.1)]"></div>
        <h2 id="loader-status" class="text-5xl font-black text-white tracking-[0.2em] mb-8">准备推演天机...</h2>
        <p id="loader-progress" class="text-xl text-red-500 font-bold animate-pulse tracking-widest uppercase">Master Bo is initializing the dynamic model</p>
    </div>

    <script>
        const apiKey = "";
        const GEMINI_MODEL = "gemini-2.5-flash-preview-09-2025";
        const TTS_MODEL = "gemini-2.5-flash-preview-tts";

        const EARTHLY_BRANCHES = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
        const HEAVENLY_STEMS = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
        const PALACES_NAMES = ["命宫", "兄弟", "夫妻", "子女", "财帛", "疾厄", "迁移", "奴仆", "官禄", "田宅", "福德", "父母"];

        let state = {
            name: "阿盛",
            gender: "男",
            calendarType: "lunar",
            year: 1980,
            month: 9,
            day: 30,
            time: "寅",
            aiAnalysis: ""
        };

        function setCalendar(type) {
            state.calendarType = type;
            document.querySelectorAll('.calendar-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`cal-${type}`).classList.add('active');
            renderChart();
        }

        function getElementColor(item) {
            if (["甲","乙","寅","卯"].includes(item)) return "text-emerald-700";
            if (["丙","丁","巳","午"].includes(item)) return "text-red-600";
            if (["庚","辛","申","酉"].includes(item)) return "text-yellow-600 font-black";
            if (["壬","癸","亥","子"].includes(item)) return "text-blue-700 font-bold";
            return "text-slate-500";
        }

        function calculatePalaces() {
            const timeIndex = EARTHLY_BRANCHES.indexOf(state.time);
            const mingGongIdx = (parseInt(state.month) - 1 - timeIndex + 12) % 12; 
            const shenGongIdx = (parseInt(state.month) - 1 + timeIndex) % 12;
            const yearStemIndex = (parseInt(state.year) - 4) % 10;
            const startStemIdx = (yearStemIndex % 5) * 2 + 2;

            let result = [];
            for (let i = 0; i < 12; i++) {
                const name = PALACES_NAMES[(i - mingGongIdx + 12) % 12];
                const stars = [];
                if (name === "命宫") stars.push({n:"紫微"}, {n:"七杀"});
                if (name === "财帛") stars.push({n:"武曲"});
                if (name === "官禄") stars.push({n:"廉贞"});
                
                result.push({
                    branch: EARTHLY_BRANCHES[(i + 2) % 12],
                    stem: HEAVENLY_STEMS[(startStemIdx + i) % 10],
                    name, stars,
                    isMingGong: name === "命宫",
                    isShenGong: i === shenGongIdx,
                    daYun: `${i * 10 + 5} - ${i * 10 + 14}`
                });
            }
            return result;
        }

        function renderChart() {
            const palaces = calculatePalaces();
            const grid = document.getElementById('palace-grid');
            grid.innerHTML = '';
            const order = [5, 6, 7, 8, 4, 'center', 9, 3, 'center', 10, 2, 1, 0, 11];
            order.forEach(idx => {
                if (idx === 'center') {
                    if (!grid.querySelector('.center-mark')) {
                        const c = document.createElement('div');
                        c.className = 'center-mark col-span-2 row-span-2 bg-[#fdfaf2] border-8 border-double border-red-900/20 rounded-[4rem] flex flex-col items-center justify-center p-8 shadow-inner';
                        c.innerHTML = `<h3 class="text-7xl font-black text-slate-900 mb-4 tracking-tighter">紫微</h3>
                            <div class="grid grid-cols-4 gap-4 px-4 py-4 bg-white/40 rounded-3xl border border-red-900/5 mb-4 text-center">
                                <div class="flex flex-col"><span class="text-[9px] text-slate-400 font-black">生年</span><span class="text-sm font-black">${state.year}</span></div>
                                <div class="flex flex-col"><span class="text-[9px] text-slate-400 font-black">时辰</span><span class="text-sm font-black">${state.time}时</span></div>
                                <div class="flex flex-col"><span class="text-[9px] text-slate-400 font-black">性别</span><span class="text-sm font-black">${state.gender}</span></div>
                                <div class="flex flex-col"><span class="text-[9px] text-slate-400 font-black">历法</span><span class="text-sm font-black">${state.calendarType === 'lunar' ? '农历' : '西历'}</span></div>
                            </div>`;
                        grid.appendChild(c);
                    }
                    return;
                }
                const p = palaces[idx];
                const card = document.createElement('div');
                card.className = `palace-card relative border p-3 h-44 md:h-52 flex flex-col justify-between transition-all duration-500 ${p.isMingGong ? 'bg-red-50/80 border-red-700 ring-4 ring-red-700/10' : 'bg-[#fffcf7] border-slate-300'}`;
                card.innerHTML = `<div class="flex justify-between items-start">
                    <span class="text-[12px] font-black px-2.5 py-1 rounded shadow-sm ${p.isMingGong ? 'bg-red-700 text-white' : 'bg-slate-800 text-white'}">${p.name} ${p.isShenGong ? '<small class="bg-amber-500 px-1 rounded ml-1 text-[10px]">身</small>' : ''}</span>
                    <span class="text-[14px] font-black ${getElementColor(p.stem)}">${p.stem}${p.branch}</span>
                </div>
                <div class="flex flex-grow items-center justify-center gap-2">
                    ${p.stars.map(s => `<span class="text-2xl font-black text-red-900 writing-vertical-lr tracking-tighter">${s.n}</span>`).join('')}
                </div>
                <div class="flex justify-between items-center text-[10px] text-slate-400 font-mono">
                    <span>${p.daYun} 岁</span>
                </div>`;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        async function callAiWithSafety(prompt, system) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: system }] },
                generationConfig: { maxOutputTokens: 8192, temperature: 0.8 },
                safetySettings: [
                    { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                    { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                    { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                    { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                ]
            };

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, { 
                        method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'application/json' } 
                    });
                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (text) return text;
                } catch (e) {}
                await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
            }
            throw new Error("天机中断，节点连接失败");
        }

        async function generate6500Words() {
            const loader = document.getElementById('global-loader');
            const status = document.getElementById('loader-status');
            const progress = document.getElementById('loader-progress');
            loader.classList.remove('hidden');

            const palaces = calculatePalaces();
            const chartData = palaces.map(p => `${p.name}(${p.stem}${p.branch}):${p.stars.map(s=>s.n).join(',')}`).join('|');
            const baseContext = `命主:${state.name}, 性别:${state.gender}, 生辰:${state.year}-${state.month}-${state.day}, 历法:${state.calendarType}, 命盘数据:${chartData}`;

            try {
                // Step 1: 3500字十二宫
                status.textContent = "推演进度 (1/2)：全宫位深解...";
                progress.textContent = "正在构建 3500 字十二宫位深度解析模型...";
                const part1 = await callAiWithSafety(
                    `${baseContext}。请进行十二宫位深度拆解，每一宫位必须详尽，总字数不少于 3500 字。`,
                    "你扮演倪海厦老师。语气刚烈、一针见血。针对提供的命盘，深度解析十二个宫位，结合易经卦象、地纪方位。字数必须极其充实。"
                );

                // Step 2: 3000字流年
                status.textContent = "推演进度 (2/2)：五年流年详批...";
                progress.textContent = "正在锁定 2026-2030 五载乾坤大势 (3000字)...";
                const part2 = await callAiWithSafety(
                    `${baseContext}。请推演 2026(丙午) 至 2030(庚戌) 这五年的流年大势，总字数不少于 3000 字。`,
                    "你扮演倪海厦老师。针对命盘，逐年推演未来五年的运势起伏、地纪开运布局、人纪防范。字数必须极其充实。"
                );

                state.aiAnalysis = `${part1}\n\n${part2}`;
                document.getElementById('ai-text').textContent = state.aiAnalysis;
                document.getElementById('ai-response-container').classList.remove('hidden');
                switchTab('analysis');
            } catch (e) {
                alert("天机推演中断：由于 6500 字内容极其庞大，网络连接超时。请再次点击重试，系统将重新连接天机。");
            } finally {
                loader.classList.add('hidden');
                status.textContent = "准备推演天机...";
            }
        }

        function prepareAndPrint() {
            if (!state.aiAnalysis) {
                alert("请先完成 6500 字分段推演，方可导出完整报告。");
                return;
            }
            document.getElementById('print-user-info').innerHTML = `<div>名讳：${state.name} | 性别：${state.gender}造</div><div>生辰：${state.year}年${state.month}月${state.day}日 (${state.calendarType === 'lunar' ? '农历' : '西历'})</div>`;
            document.getElementById('print-grid').innerHTML = document.getElementById('palace-grid').innerHTML;
            
            const printContent = document.getElementById('print-content');
            const sections = state.aiAnalysis.split('【').filter(s => s.trim() !== "");
            printContent.innerHTML = sections.map((s) => `
                <div class="page-break">
                    <div class="text-3xl leading-[2.8] text-slate-800 whitespace-pre-wrap font-serif">【${s}</div>
                </div>
            `).join('');
            window.print();
        }

        function switchTab(tab) {
            document.getElementById('view-chart').className = tab === 'chart' ? 'block overflow-x-auto pb-10 custom-scrollbar' : 'hidden';
            document.getElementById('view-analysis').className = tab === 'analysis' ? 'block space-y-16 pr-6 max-h-[1000px] overflow-y-auto custom-scrollbar' : 'hidden';
            document.querySelectorAll('.tab-btn').forEach(b => b.className = "tab-btn px-12 py-3.5 rounded-[1.5rem] text-sm font-black transition-all text-slate-400");
            document.getElementById(`tab-${tab}`).className = "tab-btn px-12 py-3.5 rounded-[1.5rem] text-sm font-black transition-all bg-white text-red-950 shadow-2xl scale-105";
        }

        function shareToWhatsApp() {
            if (!state.aiAnalysis) return alert("请先推演生成报告内容");
            const text = `【倪氏终极详批报告预览 · ${state.name}】\n全动态推演精华：\n${state.aiAnalysis.substring(0, 800)}...\n\n(查看 6500 字完整 PDF 详批请联系本人)`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        ['name', 'gender', 'time', 'year', 'month', 'day'].forEach(id => {
            document.getElementById(`input-${id}`).addEventListener('change', (e) => {
                state[id] = e.target.value;
                renderChart();
                state.aiAnalysis = "";
                document.getElementById('ai-response-container').classList.add('hidden');
            });
        });

        document.getElementById('ai-btn').addEventListener('click', generate6500Words);

        window.onload = renderChart;
    </script>
</body>
</html>
